app = 'full-stack-api'
primary_region = 'fra'

[experimental]
  cmd = ['bash', 'start_server.sh']
  private_network = true
[build]
dockerfile = './Dockerfile'

[deploy]
  release_command = 'echo Skip release'

[env]
  PORT = '80'



[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
memory = '256mb'
cpu_kind = 'shared'
cpus = 1
